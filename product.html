<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товар - Чувашский сувенир</title>
    <style>
        /* ===== БАЗОВЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #FFF4E5;
            color: #5A1F00;
            line-height: 1.6;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-content .container {
            flex: 1;
        }
        .container {
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* ===== ОРНАМЕНТЫ ===== */
        .ornament-top {
            background-image: url("images/patternorna.png");
            background-size: contain;
            background-repeat: repeat-x;
            height: 250px;
            position: relative;
            margin: 0;
            background-position: center bottom;
            top: -180px;
            margin-bottom: -190px;
            z-index: 1;
        }
        .ornament-header-bottom {
            background-image: url("images/headerpattern.png");
            background-size: contain;
            background-repeat: repeat-x;
            height: 15px;
            position: relative;
            margin: 0;
            background-position: center top;
            margin-top: -20px;
            z-index: 1;
        }
        .ornament-bottom {
            background-image: url("images/bottompattern.png");
            background-size: contain;
            background-repeat: repeat-x;
            height: 20px;
            position: relative;
            margin: 0;
            background-position: center top;
            margin-top: -20px;
        }

        /* ===== ХЕДЕР ===== */
        .header {
            background: #FFF4E5;
            position: relative;
            box-shadow: 0 2px 10px rgba(226, 74, 44, 0.1);
        }
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            gap: 20px;
            flex-wrap: wrap;
        }
        .logo {
            flex-shrink: 0;
        }
        .logo img {
            height: 80px;
            width: auto;
            transition: transform 0.3s ease;
        }
        .logo img:hover {
            transform: scale(1.05);
        }
        .nav {
            display: flex;
            gap: 25px;
            flex: 1;
            justify-content: center;
            flex-wrap: wrap;
        }
        .nav-link {
            color: #5A1F00;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            padding: 8px 0;
            position: relative;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .nav-link:hover {
            color: #E24A2C;
        }
        .nav-link.active {
            color: #E24A2C;
        }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #E24A2C;
        }
        .header-icons {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .icon-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #E24A2C, #E66830);
            border-radius: 50%;
            color: white;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s ease;
            position: relative;
        }
        .icon-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(226, 74, 44, 0.3);
        }
        .cart-link {
            position: relative;
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #FF5722;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            font-weight: bold;
            display: none;
            align-items: center;
            justify-content: center;
        }

        /* ===== СТРАНИЦА ТОВАРА (ПРОСТАЯ) ===== */
        .product-container {
            display: flex;
            gap: 50px;
            margin: 40px 0;
            align-items: flex-start;
        }
        .product-image {
            flex: 1;
            text-align: center;
        }
        .product-image img {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background: #f5f5f5;
        }
        .product-info {
            flex: 1;
        }
        .product-info .title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .product-info h1 {
            font-size: 32px;
            color: #8B2000;
            margin: 0;
            flex: 1;
        }
        .product-price {
            font-size: 28px;
            font-weight: bold;
            color: #E24A2C;
            margin: 15px 0 20px;
        }
        .product-desc {
            font-size: 16px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .product-buy {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .product-buy input {
            width: 70px;
            padding: 10px;
            border: 2px solid #E0A400;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            background: white;
        }
        .product-buy input:focus {
            border-color: #E24A2C;
            outline: none;
        }
        .btn {
            background: linear-gradient(135deg, #E24A2C, #E66830);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(226, 74, 44, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(226, 74, 44, 0.4);
        }
        .btn-fav {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 5px 10px;
            transition: transform 0.2s;
        }
        .btn-fav:hover {
            transform: scale(1.1);
        }
        .btn-fav.active {
            color: #E24A2C;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }

        /* ===== ПОДВАЛ ===== */
        .footer {
            background: #8B2000;
            color: white;
            margin-top: 50px;
            padding: 40px 0 25px;
            position: relative;
            flex-shrink: 0;
        }
        .footer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .footer h3 {
            margin-bottom: 15px;
            font-size: 18px;
            position: relative;
            display: inline-block;
            color: #fff;
        }
        .footer h3::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 35px;
            height: 2px;
            background: #FBE8C7;
        }
        .footer p {
            line-height: 1.6;
            margin: 5px 0;
            font-size: 14px;
            color: #fff;
        }
        .footer a {
            text-decoration: none;
            color: #fff;
            transition: opacity 0.3s ease;
        }
        .footer a:hover {
            text-decoration: underline;
            opacity: 0.8;
        }
        .social-icons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .social-icon {
            color: white;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .social-icon:hover {
            background: rgba(255, 255, 255, 0.15);
            text-decoration: none;
            border-color: #fff;
        }

        /* ====================================================== */
        /* ===== АДАПТИВ ===== */
        /* ====================================================== */

        @media (max-width: 1024px) {
            .header-content {
                gap: 15px;
            }
            .nav {
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 0;
                gap: 10px;
                flex-wrap: nowrap;
            }
            .logo {
                order: 1;
                flex: 0 0 auto;
            }
            .logo img {
                height: 60px;
            }
            .nav {
                order: 2;
                width: 100%;
                justify-content: center;
                gap: 12px;
                flex-wrap: wrap;
                padding: 5px 0;
            }
            .header-icons {
                order: 3;
                gap: 10px;
                flex: 0 0 auto;
                justify-content: flex-end;
            }
            .icon-link {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            .ornament-top {
                background-size: 150% auto;
                height: 320px;
                top: -250px;
                margin-bottom: -260px;
            }
            .ornament-header-bottom {
                background-size: 150% auto;
                height: 15px;
                margin-top: -20px;
            }
            .ornament-bottom {
                background-size: 150% auto;
                height: 30px;
                margin-top: -25px;
            }

            .product-container {
                flex-direction: column;
                gap: 30px;
                margin: 20px 0;
            }
            .product-image img {
                max-width: 100%;
            }
            .product-info h1 {
                font-size: 26px;
            }
            .product-price {
                font-size: 24px;
            }
            .footer-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 30px;
                text-align: center;
            }
            .footer h3::after {
                left: 50%;
                transform: translateX(-50%);
            }
            .social-icons {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .header-content {
                padding: 10px 0;
                gap: 8px;
            }
            .logo img {
                height: 50px;
            }
            .nav {
                gap: 8px 12px;
            }
            .nav-link {
                font-size: 13px;
            }
            .header-icons {
                gap: 8px;
            }
            .icon-link {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }
            .ornament-top {
                background-size: 200% auto;
                height: 380px;
                top: -300px;
                margin-bottom: -310px;
            }
            .ornament-header-bottom {
                background-size: 200% auto;
                height: 15px;
                margin-top: -20px;
            }
            .ornament-bottom {
                background-size: 200% auto;
                height: 35px;
                margin-top: -30px;
            }

            .product-info h1 {
                font-size: 22px;
            }
            .product-price {
                font-size: 20px;
            }
            .product-buy {
                flex-direction: column;
                align-items: stretch;
            }
            .product-buy input {
                width: 100%;
                max-width: 100px;
                margin: 0 auto;
            }
            .btn {
                width: 100%;
                text-align: center;
            }
            .footer-grid {
                grid-template-columns: 1fr;
                gap: 25px;
                text-align: center;
            }
            .footer h3::after {
                left: 50%;
                transform: translateX(-50%);
            }
            .social-icons {
                justify-content: center;
            }
        }

        @media (max-width: 360px) {
            .nav {
                flex-direction: column;
                gap: 6px;
            }
            .logo img {
                height: 42px;
            }
            .ornament-top {
                background-size: 250% auto;
                height: 420px;
                top: -330px;
                margin-bottom: -340px;
            }
            .ornament-header-bottom {
                background-size: 250% auto;
                height: 15px;
                margin-top: -20px;
            }
            .ornament-bottom {
                background-size: 250% auto;
                height: 40px;
                margin-top: -35px;
            }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <header class="header">
            <div class="ornament-top"></div>
            <div class="container">
                <div class="header-content">
                    <div class="logo">
                        <a href="index.html">
                            <img src="images/logo.png" alt="Чувашский сувенир">
                        </a>
                    </div>
                    <nav class="nav">
                        <a href="index.html" class="nav-link">Главная</a>
                        <a href="catalog.html" class="nav-link">Каталог</a>
                        <a href="about.html" class="nav-link">О мастерах</a>
                        <a href="contacts.html" class="nav-link">Контакты</a>
                    </nav>
                    <div class="header-icons">
                        <a href="#" id="accountLink" class="icon-link" title="Личный кабинет">👤</a>
                        <a href="cart.html" class="icon-link cart-link" title="Корзина">
                            🛒
                            <span class="cart-count">0</span>
                        </a>
                    </div>
                </div>
            </div>
            <div class="ornament-header-bottom"></div>
        </header>

        <div class="container">
            <div id="productContainer" class="product-container">
                <div class="loading">Загрузка товара...</div>
            </div>
        </div>

        <footer class="footer">
            <div class="ornament-bottom"></div>
            <div class="container footer-grid">
                <div>
                    <h3>Контакты</h3>
                    <p>+7 (999) 444-44-44<br>test@gmail.com</p>
                </div>
                <div>
                    <h3>Разделы</h3>
                    <p><a href="index.html">Главная</a><br><a href="catalog.html">Каталог</a><br><a href="about.html">О мастерах</a></p>
                </div>
                <div>
                    <h3>Мы в соц-сетях</h3>
                    <div class="social-icons">
                        <a href="#" class="social-icon">VK</a>
                        <a href="#" class="social-icon">TG</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAVOJtq1tCCie0dDjB_GDoH8AQB0EKe_84",
            authDomain: "chuvash-souvenir.firebaseapp.com",
            projectId: "chuvash-souvenir",
            storageBucket: "chuvash-souvenir.firebasestorage.app",
            messagingSenderId: "754730678926",
            appId: "1:754730678926:web:5e45e557c0d298072027df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentProduct = null;
        let productId = new URLSearchParams(window.location.search).get('id');

        const accountLink = document.getElementById('accountLink');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                accountLink.href = 'account.html';
            } else {
                accountLink.href = 'login.html';
            }
        });

        if (!productId) {
            document.getElementById('productContainer').innerHTML = '<div class="loading">Товар не найден</div>';
        } else {
            loadProduct(productId);
        }

        async function loadProduct(id) {
            const container = document.getElementById('productContainer');
            try {
                const docRef = doc(db, 'products', id);
                const docSnap = await getDoc(docRef);
                if (!docSnap.exists()) {
                    container.innerHTML = '<div class="loading">Товар не найден</div>';
                    return;
                }
                currentProduct = { id: docSnap.id, ...docSnap.data() };

                // Получаем избранное
                const isFav = getFavoriteStatus(id);

                container.innerHTML = `
                    <div class="product-image">
                        <img src="images/test.jpg" alt="${currentProduct.name}">
                    </div>
                    <div class="product-info">
                        <div class="title-row">
                            <h1>${currentProduct.name}</h1>
                            <button class="btn-fav ${isFav ? 'active' : ''}" id="favBtn">${isFav ? '❤️' : '🤍'}</button>
                        </div>
                        <div class="product-price">${currentProduct.price} ₽</div>
                        <p class="product-desc">${currentProduct.description || 'Традиционный чувашский сувенир'}</p>
                        <div class="product-buy">
                            <input type="number" id="quantity" value="1" min="1" max="10">
                            <button id="addToCartBtn" class="btn">В корзину</button>
                        </div>
                    </div>
                `;

                // Кнопка избранного
                const favBtn = document.getElementById('favBtn');
                if (favBtn) {
                    favBtn.addEventListener('click', () => {
                        const isActive = favBtn.classList.contains('active');
                        let favs = JSON.parse(localStorage.getItem('favorites')) || [];
                        if (isActive) {
                            favs = favs.filter(fid => fid !== productId);
                            favBtn.classList.remove('active');
                            favBtn.innerHTML = '🤍';
                        } else {
                            favs.push(productId);
                            favBtn.classList.add('active');
                            favBtn.innerHTML = '❤️';
                        }
                        localStorage.setItem('favorites', JSON.stringify(favs));
                    });
                }

                // Кнопка корзины
                document.getElementById('addToCartBtn').addEventListener('click', () => {
                    const quantity = parseInt(document.getElementById('quantity').value) || 1;
                    let cart = JSON.parse(localStorage.getItem('cartItems')) || [];
                    const existing = cart.find(item => item.name === currentProduct.name);
                    if (existing) {
                        existing.quantity = Math.min(existing.quantity + quantity, 10);
                    } else {
                        cart.push({
                            id: productId,
                            name: currentProduct.name,
                            price: currentProduct.price,
                            quantity: quantity,
                            description: currentProduct.description
                        });
                    }
                    localStorage.setItem('cartItems', JSON.stringify(cart));
                    updateCartCounter();
                    alert(`"${currentProduct.name}" добавлен в корзину`);
                });

                updateCartCounter();
            } catch (error) {
                console.error('Ошибка загрузки товара:', error);
                container.innerHTML = '<div class="loading">Ошибка загрузки товара</div>';
            }
        }

        function getFavoriteStatus(productId) {
            try {
                const favs = JSON.parse(localStorage.getItem('favorites')) || [];
                return favs.includes(productId);
            } catch { return false; }
        }

        function updateCartCounter() {
            const cart = JSON.parse(localStorage.getItem('cartItems')) || [];
            const total = cart.reduce((s, i) => s + i.quantity, 0);
            const el = document.querySelector('.cart-count');
            if (el) {
                el.textContent = total;
                el.style.display = total > 0 ? 'flex' : 'none';
            }
        }
    </script>
</body>
</html>
