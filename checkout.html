<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа - Чувашский сувенир</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-content">
        <header class="header">
            <div class="ornament-top"></div>
            <div class="container">
                <div class="header-content">
                    <div class="logo">
                        <a href="index.html">
                            <img src="images/logo.png" alt="Чувашский сувенир">
                        </a>
                    </div>
                    <nav class="nav">
                        <a href="index.html" class="nav-link">Главная</a>
                        <a href="catalog.html" class="nav-link">Каталог</a>
                        <a href="about.html" class="nav-link">О мастерах</a>
                        <a href="contacts.html" class="nav-link">Контакты</a>
                    </nav>
                    <div class="header-actions">
                        <div class="search-box">
                            <input type="text" placeholder="Поиск товаров..." class="search-input">
                            <button class="search-btn">🔍</button>
                        </div>
                        <div class="header-icons">
                            <a href="account.html" class="icon-link" title="Личный кабинет">
                                <span class="icon">👤</span>
                            </a>
                            <a href="cart.html" class="icon-link cart-link" title="Корзина">
                                <span class="icon">🛒</span>
                                <span class="cart-count">0</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ornament-header-bottom"></div>
        </header>

        <div class="container">
            <div class="checkout-header">
                <h1>Оформление заказа</h1>
                <div class="checkout-steps">
                    <div class="step"><span class="step-number">1</span><span class="step-text">Корзина</span></div>
                    <div class="step active"><span class="step-number">2</span><span class="step-text">Оформление</span></div>
                    <div class="step"><span class="step-number">3</span><span class="step-text">Подтверждение</span></div>
                </div>
            </div>

            <div class="checkout-content">
                <div class="checkout-left">
                    <section class="checkout-section">
                        <h2>Данные покупателя</h2>
                        <div class="form-group">
                            <label>Имя *</label>
                            <input type="text" id="customerName" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="customerEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Телефон *</label>
                            <input type="tel" id="customerPhone" required>
                        </div>
                        <div class="form-group">
                            <label>Адрес доставки *</label>
                            <input type="text" id="customerAddress" required>
                        </div>
                    </section>
                </div>

                <div class="checkout-right">
                    <div class="order-summary">
                        <h3>Ваш заказ</h3>
                        <div id="orderItems"></div>
                        <div class="total-row">
                            <span>Итого:</span>
                            <span id="orderTotal">0 ₽</span>
                        </div>
                        <button class="checkout-btn" id="placeOrderBtn">Оформить заказ</button>
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <div class="ornament-bottom"></div>
            <div class="container footer-grid">
                <div><h3>Контакты</h3><p>+7 (999) 444-44-44<br>test@gmail.com</p></div>
                <div><h3>Разделы</h3><p><a href="index.html">Главная</a><br><a href="catalog.html">Каталог</a><br><a href="about.html">О мастерах</a></p></div>
                <div><h3>Мы в соц-сетях</h3><div class="social-icons"><a href="#" class="social-icon">VK</a><a href="#" class="social-icon">TG</a></div></div>
            </div>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyAVOJtq1tCCie0dDjB_GDoH8AQB0EKe_84",
            authDomain: "chuvash-souvenir.firebaseapp.com",
            projectId: "chuvash-souvenir",
            storageBucket: "chuvash-souvenir.firebasestorage.app",
            messagingSenderId: "754730678926",
            appId: "1:754730678926:web:5e45e557c0d298072027df"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
        
        function renderOrder() {
            const container = document.getElementById('orderItems');
            let total = 0;
            container.innerHTML = '';
            cartItems.forEach(item => {
                total += item.price * item.quantity;
                container.innerHTML += `
                    <div class="order-item">
                        <span>${item.name} x${item.quantity}</span>
                        <span>${item.price * item.quantity} ₽</span>
                    </div>
                `;
            });
            document.getElementById('orderTotal').textContent = total + ' ₽';
        }
        
        document.getElementById('placeOrderBtn').addEventListener('click', async () => {
            const name = document.getElementById('customerName').value;
            const email = document.getElementById('customerEmail').value;
            const phone = document.getElementById('customerPhone').value;
            const address = document.getElementById('customerAddress').value;
            
            if (!name || !email || !phone || !address) {
                alert('Заполните все поля');
                return;
            }
            
            const order = {
                customer: { name, email, phone, address },
                items: cartItems,
                total: cartItems.reduce((sum, i) => sum + i.price * i.quantity, 0),
                status: 'new',
                createdAt: new Date()
            };
            
            try {
                await addDoc(collection(db, 'orders'), order);
                localStorage.removeItem('cartItems');
                alert('Заказ оформлен!');
                window.location.href = 'order-success.html';
            } catch (error) {
                alert('Ошибка при оформлении заказа');
                console.error(error);
            }
        });
        
        renderOrder();
        
        function updateCartCounter() {
            const total = cartItems.reduce((sum, i) => sum + i.quantity, 0);
            const el = document.querySelector('.cart-count');
            if (el) { el.textContent = total; el.style.display = total > 0 ? 'flex' : 'none'; }
        }
        updateCartCounter();
    </script>
    
    <style>
        .checkout-content { display: flex; gap: 40px; max-width: 1000px; margin: 0 auto; }
        .checkout-left { flex: 1; }
        .checkout-right { width: 300px; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .order-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .total-row { font-size: 18px; font-weight: bold; margin-top: 15px; display: flex; justify-content: space-between; }
        .checkout-btn { width: 100%; padding: 12px; background: #E24A2C; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        @media (max-width: 768px) { .checkout-content { flex-direction: column; } .checkout-right { width: 100%; } }
    </style>
</body>
</html>
