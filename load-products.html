<!DOCTYPE html>
<html>
<head>
    <title>Загрузка товаров в Firebase</title>
</head>
<body>
    <h1>Загрузка товаров...</h1>
    <pre id="result"></pre>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyAVOJtq1tCCie0dDjB_GDoH8AQB0EKe_84",
            authDomain: "chuvash-souvenir.firebaseapp.com",
            projectId: "chuvash-souvenir",
            storageBucket: "chuvash-souvenir.firebasestorage.app",
            messagingSenderId: "754730678926",
            appId: "1:754730678926:web:5e45e557c0d298072027df"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const products = [
            { name: "Вышитая рубаха", description: "Традиционная чувашская вышивка", price: 2500, category: "clothing", inStock: true },
            { name: "Кукла-оберег", description: "Ручная работа из натуральных материалов", price: 1800, category: "dolls", inStock: true },
            { name: "Деревянная посуда", description: "Набор посуды с традиционными орнаментами", price: 3200, category: "dishes", inStock: true },
            { name: "Чувашский платок", description: "Шерстяной платок с традиционным орнаментом", price: 1500, category: "clothing", inStock: true }
            { name: "Вышитая сумка", description: "Сумка с чувашской вышивкой", price: 2200, category: "accessories", inStock: true },
            { name: "Головной убор", description: "Традиционный женский головной убор", price: 2800, category: "clothing", inStock: true }
        ];
        
        async function loadProducts() {
            const resultDiv = document.getElementById('result');
            for (let product of products) {
                try {
                    const docRef = await addDoc(collection(db, 'products'), product);
                    resultDiv.innerHTML += `✓ Добавлен: ${product.name}\n`;
                } catch (error) {
                    resultDiv.innerHTML += `✗ Ошибка: ${product.name} - ${error.message}\n`;
                }
            }
        }
        
        loadProducts();
    </script>
</body>
</html>
