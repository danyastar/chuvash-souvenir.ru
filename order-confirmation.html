<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ оформлен - Чувашский сувенир</title>
    <style>
        /* ===== БАЗОВЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #FFF4E5;
            color: #5A1F00;
            line-height: 1.6;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-content .container {
            flex: 1;
        }
        .container {
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* ===== ОРНАМЕНТЫ ===== */
        .ornament-top {
            background-image: url("images/patternorna.png");
            background-size: contain;
            background-repeat: repeat-x;
            height: 250px;
            position: relative;
            margin: 0;
            background-position: center bottom;
            top: -180px;
            margin-bottom: -190px;
            z-index: 1;
        }
        .ornament-header-bottom {
            background-image: url("images/headerpattern.png");
            background-size: contain;
            background-repeat: repeat-x;
            height: 15px;
            position: relative;
            margin: 0;
            background-position: center top;
            margin-top: -20px;
            z-index: 1;
        }
        .ornament-bottom {
            background-image: url("images/bottompattern.png");
            background-size: contain;
            background-repeat: repeat-x;
            height: 20px;
            position: relative;
            margin: 0;
            background-position: center top;
            margin-top: -20px;
        }

        /* ===== ХЕДЕР (КАК НА ГЛАВНОЙ) ===== */
        .header {
            background: #FFF4E5;
            position: relative;
            box-shadow: 0 2px 10px rgba(226, 74, 44, 0.1);
        }
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            gap: 20px;
            flex-wrap: wrap;
        }
        .logo {
            flex-shrink: 0;
        }
        .logo img {
            height: 80px;
            width: auto;
            transition: transform 0.3s ease;
        }
        .logo img:hover {
            transform: scale(1.05);
        }
        .nav {
            display: flex;
            gap: 25px;
            flex: 1;
            justify-content: center;
            flex-wrap: wrap;
        }
        .nav-link {
            color: #5A1F00;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            padding: 8px 0;
            position: relative;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .nav-link:hover {
            color: #E24A2C;
        }
        .nav-link.active {
            color: #E24A2C;
        }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #E24A2C;
        }
        .header-icons {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .icon-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #E24A2C, #E66830);
            border-radius: 50%;
            color: white;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s ease;
            position: relative;
        }
        .icon-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(226, 74, 44, 0.3);
        }
        .cart-link {
            position: relative;
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #FF5722;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            font-weight: bold;
            display: none;
            align-items: center;
            justify-content: center;
        }

        /* ===== СТРАНИЦА ПОДТВЕРЖДЕНИЯ ===== */
        .confirmation-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 2px solid #E0A400;
        }
        .success-icon {
            font-size: 70px;
            margin-bottom: 20px;
        }
        .confirmation-container h1 {
            color: #4CAF50;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .confirmation-container>p {
            color: #666;
            font-size: 16px;
        }
        .order-number {
            font-size: 24px;
            font-weight: bold;
            color: #8B2000;
            margin: 20px 0;
        }
        .order-details {
            text-align: left;
            background: #FFF6E1;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border: 1px solid #E0A400;
        }
        .order-details h3 {
            margin-top: 0;
            color: #8B2000;
            border-bottom: 2px solid #E0A400;
            padding-bottom: 10px;
            font-size: 18px;
        }
        .order-details h3:not(:first-child) {
            margin-top: 20px;
        }
        .order-details p {
            margin: 5px 0;
            color: #5A1F00;
        }
        .order-items {
            margin: 15px 0;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #E0A400;
            font-size: 14px;
        }
        .order-item:last-child {
            border-bottom: none;
        }
        .order-total {
            font-size: 18px;
            font-weight: bold;
            text-align: right;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 2px solid #E0A400;
            color: #8B2000;
        }
        .customer-info {
            margin: 15px 0;
        }
        .customer-info p {
            margin: 5px 0;
            font-size: 14px;
        }
        .customer-info strong {
            color: #5A1F00;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #E24A2C, #E66830);
            color: white;
            box-shadow: 0 4px 12px rgba(226, 74, 44, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(226, 74, 44, 0.4);
        }
        .btn-outline {
            background: white;
            border: 2px solid #E24A2C;
            color: #E24A2C;
        }
        .btn-outline:hover {
            background: #E24A2C;
            color: white;
        }

        /* ===== ПОДВАЛ ===== */
        .footer {
            background: #8B2000;
            color: white;
            margin-top: 50px;
            padding: 40px 0 25px;
            position: relative;
            flex-shrink: 0;
        }
        .footer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .footer h3 {
            margin-bottom: 15px;
            font-size: 18px;
            position: relative;
            display: inline-block;
            color: #fff;
        }
        .footer h3::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 35px;
            height: 2px;
            background: #FBE8C7;
        }
        .footer p {
            line-height: 1.6;
            margin: 5px 0;
            font-size: 14px;
            color: #fff;
        }
        .footer a {
            text-decoration: none;
            color: #fff;
            transition: opacity 0.3s ease;
        }
        .footer a:hover {
            text-decoration: underline;
            opacity: 0.8;
        }
        .social-icons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .social-icon {
            color: white;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .social-icon:hover {
            background: rgba(255, 255, 255, 0.15);
            text-decoration: none;
            border-color: #fff;
        }

        /* ====================================================== */
        /* ===== АДАПТИВ ===== */
        /* ====================================================== */

        @media (max-width: 1024px) {
            .header-content {
                gap: 15px;
            }
            .nav {
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            /* --- ХЕДЕР --- */
            .header-content {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 0;
                gap: 10px;
                flex-wrap: nowrap;
            }
            .logo {
                order: 1;
                flex: 0 0 auto;
            }
            .logo img {
                height: 60px;
            }
            .nav {
                order: 2;
                width: 100%;
                justify-content: center;
                gap: 12px;
                flex-wrap: wrap;
                padding: 5px 0;
            }
            .header-icons {
                order: 3;
                gap: 10px;
                flex: 0 0 auto;
                justify-content: flex-end;
            }
            .icon-link {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            /* --- ОРНАМЕНТЫ --- */
            .ornament-top {
                background-size: 150% auto;
                height: 320px;
                top: -250px;
                margin-bottom: -260px;
            }
            .ornament-header-bottom {
                background-size: 150% auto;
                height: 15px;
                margin-top: -20px;
            }
            .ornament-bottom {
                background-size: 150% auto;
                height: 30px;
                margin-top: -25px;
            }

            /* --- ПОДТВЕРЖДЕНИЕ --- */
            .confirmation-container {
                margin: 20px 15px;
                padding: 25px 20px;
            }
            .confirmation-container h1 {
                font-size: 26px;
            }
            .order-number {
                font-size: 20px;
            }
            .order-details {
                padding: 15px;
            }
            .actions {
                flex-direction: column;
                align-items: center;
            }
            .actions .btn {
                width: 100%;
                max-width: 300px;
                text-align: center;
            }

            /* --- ПОДВАЛ --- */
            .footer-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 30px;
                text-align: center;
            }
            .footer h3::after {
                left: 50%;
                transform: translateX(-50%);
            }
            .social-icons {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            /* --- ХЕДЕР --- */
            .header-content {
                padding: 10px 0;
                gap: 8px;
            }
            .logo img {
                height: 50px;
            }
            .nav {
                gap: 8px 12px;
            }
            .nav-link {
                font-size: 13px;
            }
            .header-icons {
                gap: 8px;
            }
            .icon-link {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }

            /* --- ОРНАМЕНТЫ --- */
            .ornament-top {
                background-size: 200% auto;
                height: 380px;
                top: -300px;
                margin-bottom: -310px;
            }
            .ornament-header-bottom {
                background-size: 200% auto;
                height: 15px;
                margin-top: -20px;
            }
            .ornament-bottom {
                background-size: 200% auto;
                height: 35px;
                margin-top: -30px;
            }

            /* --- ПОДТВЕРЖДЕНИЕ --- */
            .confirmation-container {
                margin: 15px 10px;
                padding: 20px 15px;
            }
            .confirmation-container h1 {
                font-size: 22px;
            }
            .success-icon {
                font-size: 50px;
            }
            .order-number {
                font-size: 18px;
            }
            .order-details {
                padding: 12px;
            }
            .order-details h3 {
                font-size: 16px;
            }
            .order-item {
                font-size: 13px;
                padding: 6px 0;
            }
            .order-total {
                font-size: 16px;
            }
            .customer-info p {
                font-size: 13px;
            }

            /* --- ПОДВАЛ --- */
            .footer-grid {
                grid-template-columns: 1fr;
                gap: 25px;
                text-align: center;
            }
            .footer h3::after {
                left: 50%;
                transform: translateX(-50%);
            }
            .social-icons {
                justify-content: center;
            }
        }

        @media (max-width: 360px) {
            .nav {
                flex-direction: column;
                gap: 6px;
            }
            .logo img {
                height: 42px;
            }

            .ornament-top {
                background-size: 250% auto;
                height: 420px;
                top: -330px;
                margin-bottom: -340px;
            }
            .ornament-header-bottom {
                background-size: 250% auto;
                height: 15px;
                margin-top: -20px;
            }
            .ornament-bottom {
                background-size: 250% auto;
                height: 40px;
                margin-top: -35px;
            }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <header class="header">
            <div class="ornament-top"></div>
            <div class="container">
                <div class="header-content">
                    <div class="logo">
                        <a href="index.html">
                            <img src="images/logo.png" alt="Чувашский сувенир">
                        </a>
                    </div>
                    <nav class="nav">
                        <a href="index.html" class="nav-link">Главная</a>
                        <a href="catalog.html" class="nav-link">Каталог</a>
                        <a href="about.html" class="nav-link">О мастерах</a>
                        <a href="contacts.html" class="nav-link">Контакты</a>
                    </nav>
                    <div class="header-icons">
                        <a href="account.html" class="icon-link" title="Личный кабинет">👤</a>
                        <a href="cart.html" class="icon-link cart-link" title="Корзина">
                            🛒
                            <span class="cart-count">0</span>
                        </a>
                    </div>
                </div>
            </div>
            <div class="ornament-header-bottom"></div>
        </header>

        <div class="container">
            <div class="confirmation-container" id="confirmationContainer">
                <div class="success-icon">✅</div>
                <h1>Заказ успешно оформлен!</h1>
                <p>Спасибо за покупку. Наш менеджер свяжется с вами в ближайшее время.</p>
                <div id="orderDetails"></div>
                <div class="actions">
                    <a href="catalog.html" class="btn btn-primary">Продолжить покупки</a>
                    <a href="account.html" class="btn btn-outline">Личный кабинет</a>
                </div>
            </div>
        </div>

        <footer class="footer">
            <div class="ornament-bottom"></div>
            <div class="container footer-grid">
                <div>
                    <h3>Контакты</h3>
                    <p>+7 (999) 444-44-44<br>test@gmail.com</p>
                </div>
                <div>
                    <h3>Разделы</h3>
                    <p><a href="index.html">Главная</a><br><a href="catalog.html">Каталог</a><br><a href="about.html">О мастерах</a></p>
                </div>
                <div>
                    <h3>Мы в соц-сетях</h3>
                    <div class="social-icons">
                        <a href="#" class="social-icon">VK</a>
                        <a href="#" class="social-icon">TG</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        function updateCartCounter() {
            const cart = JSON.parse(localStorage.getItem('cartItems')) || [];
            const total = cart.reduce((s, i) => s + i.quantity, 0);
            const el = document.querySelector('.cart-count');
            if (el) {
                el.textContent = total;
                el.style.display = total > 0 ? 'flex' : 'none';
            }
        }

        function displayOrder() {
            const lastOrder = localStorage.getItem('lastOrder');
            if (!lastOrder) {
                document.getElementById('orderDetails').innerHTML = '<p>Информация о заказе не найдена</p>';
                return;
            }

            const order = JSON.parse(lastOrder);
            const orderNumber = Math.floor(1000 + Math.random() * 9000);
            const orderDate = new Date().toLocaleDateString('ru-RU');

            let itemsHtml = '';
            let total = 0;
            order.items.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                itemsHtml += `
                    <div class="order-item">
                        <span>${item.name} x${item.quantity}</span>
                        <span>${itemTotal} ₽</span>
                    </div>
                `;
            });

            const html = `
                <div class="order-number">Заказ №${orderNumber}</div>
                <div class="order-details">
                    <h3>Детали заказа</h3>
                    <p><strong>Дата:</strong> ${orderDate}</p>
                    <p><strong>Способ доставки:</strong> ${order.deliveryMethod || 'Курьер'}</p>
                    <p><strong>Способ оплаты:</strong> ${order.paymentMethod || 'Картой онлайн'}</p>

                    <h3>Состав заказа</h3>
                    <div class="order-items">${itemsHtml}</div>
                    <div class="order-total">Итого: ${total} ₽</div>

                    <h3>Данные получателя</h3>
                    <div class="customer-info">
                        <p><strong>Имя:</strong> ${order.customer.name}</p>
                        <p><strong>Email:</strong> ${order.customer.email}</p>
                        <p><strong>Телефон:</strong> ${order.customer.phone}</p>
                        <p><strong>Адрес:</strong> ${order.customer.address}</p>
                    </div>
                </div>
            `;

            document.getElementById('orderDetails').innerHTML = html;
        }

        displayOrder();
        updateCartCounter();
    </script>
</body>
</html>
