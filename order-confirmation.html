<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ оформлен - Чувашский сувенир</title>
    <link rel="stylesheet" href="style.css">
    <style>
        html, body { height: 100%; margin: 0; }
        .main-content { display: flex; flex-direction: column; min-height: 100vh; }
        .main-content .container { flex: 1; }
        
        .confirmation-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .success-icon {
            font-size: 70px;
            margin-bottom: 20px;
        }
        .confirmation-container h1 {
            color: #4CAF50;
            margin-bottom: 10px;
        }
        .order-number {
            font-size: 24px;
            font-weight: bold;
            color: #8B2000;
            margin: 20px 0;
        }
        .order-details {
            text-align: left;
            background: #FFF6E1;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .order-details h3 {
            margin-top: 0;
            color: #8B2000;
            border-bottom: 2px solid #E0A400;
            padding-bottom: 10px;
        }
        .order-items {
            margin: 15px 0;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #E0A400;
        }
        .order-total {
            font-size: 18px;
            font-weight: bold;
            text-align: right;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 2px solid #E0A400;
        }
        .customer-info {
            margin: 15px 0;
        }
        .customer-info p {
            margin: 5px 0;
        }
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        .btn {
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #E24A2C, #E66830);
            color: white;
        }
        .btn-outline {
            background: white;
            border: 2px solid #E24A2C;
            color: #E24A2C;
        }
        @media (max-width: 768px) {
            .confirmation-container { margin: 20px; padding: 20px; }
            .actions { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <header class="header">
            <div class="ornament-top"></div>
            <div class="container">
                <div class="header-content">
                    <div class="logo"><a href="index.html"><img src="images/logo.png" alt="Чувашский сувенир"></a></div>
                    <nav class="nav">
                        <a href="index.html" class="nav-link">Главная</a>
                        <a href="catalog.html" class="nav-link">Каталог</a>
                        <a href="about.html" class="nav-link">О мастерах</a>
                        <a href="contacts.html" class="nav-link">Контакты</a>
                    </nav>
                    <div class="header-actions">
                        <div class="search-box"><input type="text" placeholder="Поиск товаров..." class="search-input"><button class="search-btn">🔍</button></div>
                        <div class="header-icons">
                            <a href="account.html" class="icon-link" title="Личный кабинет"><span class="icon">👤</span></a>
                            <a href="cart.html" class="icon-link cart-link" title="Корзина"><span class="icon">🛒</span><span class="cart-count">0</span></a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ornament-header-bottom"></div>
        </header>

        <div class="container">
            <div class="confirmation-container" id="confirmationContainer">
                <div class="success-icon">🎉</div>
                <h1>Заказ успешно оформлен!</h1>
                <p>Спасибо за покупку. Наш менеджер свяжется с вами в ближайшее время.</p>
                <div id="orderDetails"></div>
                <div class="actions">
                    <a href="catalog.html" class="btn btn-primary">Продолжить покупки</a>
                    <a href="account.html" class="btn btn-outline">Личный кабинет</a>
                </div>
            </div>
        </div>

        <footer class="footer">
            <div class="ornament-bottom"></div>
            <div class="container footer-grid">
                <div><h3>Контакты</h3><p>+7 (999) 444-44-44<br>test@gmail.com</p></div>
                <div><h3>Разделы</h3><p><a href="index.html">Главная</a><br><a href="catalog.html">Каталог</a><br><a href="about.html">О мастерах</a></p></div>
                <div><h3>Мы в соц-сетях</h3><div class="social-icons"><a href="#" class="social-icon">VK</a><a href="#" class="social-icon">TG</a></div></div>
            </div>
        </footer>
    </div>

    <script>
        function updateCartCounter() {
            const cart = JSON.parse(localStorage.getItem('cartItems')) || [];
            const total = cart.reduce((s, i) => s + i.quantity, 0);
            const el = document.querySelector('.cart-count');
            if (el) { el.textContent = total; el.style.display = total > 0 ? 'flex' : 'none'; }
        }
        
        function displayOrder() {
            const lastOrder = localStorage.getItem('lastOrder');
            if (!lastOrder) {
                document.getElementById('orderDetails').innerHTML = '<p>Информация о заказе не найдена</p>';
                return;
            }
            
            const order = JSON.parse(lastOrder);
            const orderNumber = Math.floor(1000 + Math.random() * 9000);
            const orderDate = new Date().toLocaleDateString('ru-RU');
            
            let itemsHtml = '';
            let total = 0;
            order.items.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                itemsHtml += `
                    <div class="order-item">
                        <span>${item.name} x${item.quantity}</span>
                        <span>${itemTotal} ₽</span>
                    </div>
                `;
            });
            
            const html = `
                <div class="order-number">Заказ №${orderNumber}</div>
                <div class="order-details">
                    <h3>Детали заказа</h3>
                    <p><strong>Дата:</strong> ${orderDate}</p>
                    <p><strong>Способ доставки:</strong> ${order.deliveryMethod || 'Курьер'}</p>
                    <p><strong>Способ оплаты:</strong> ${order.paymentMethod || 'Картой онлайн'}</p>
                    
                    <h3 style="margin-top: 20px;">Состав заказа</h3>
                    <div class="order-items">${itemsHtml}</div>
                    <div class="order-total">Итого: ${total} ₽</div>
                    
                    <h3 style="margin-top: 20px;">Данные получателя</h3>
                    <div class="customer-info">
                        <p><strong>Имя:</strong> ${order.customer.name}</p>
                        <p><strong>Email:</strong> ${order.customer.email}</p>
                        <p><strong>Телефон:</strong> ${order.customer.phone}</p>
                        <p><strong>Адрес:</strong> ${order.customer.address}</p>
                    </div>
                </div>
            `;
            
            document.getElementById('orderDetails').innerHTML = html;
        }
        
        displayOrder();
        updateCartCounter();
    </script>
</body>
</html>
