<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - Чувашский сувенир</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-content">
        <header class="header">
            <div class="ornament-top"></div>
            <div class="container">
                <div class="header-content">
                    <div class="logo">
                        <a href="index.html">
                            <img src="images/logo.png" alt="Чувашский сувенир">
                        </a>
                    </div>
                    <nav class="nav">
                        <a href="index.html" class="nav-link">Главная</a>
                        <a href="catalog.html" class="nav-link active">Каталог</a>
                        <a href="about.html" class="nav-link">О мастерах</a>
                        <a href="contacts.html" class="nav-link">Контакты</a>
                    </nav>
                    <div class="header-actions">
                        <div class="search-box">
                            <input type="text" placeholder="Поиск товаров..." class="search-input">
                            <button class="search-btn">🔍</button>
                        </div>
                        <div class="header-icons">
                            <a href="account.html" class="icon-link" title="Личный кабинет">
                                <span class="icon">👤</span>
                            </a>
                            <a href="cart.html" class="icon-link cart-link" title="Корзина">
                                <span class="icon">🛒</span>
                                <span class="cart-count">0</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ornament-header-bottom"></div>
        </header>

        <div class="container">
            <div class="catalog-page">
                <h2>Каталог товаров</h2>

                <div class="filters">
                    <select id="categoryFilter">
                        <option value="all">Все категории</option>
                        <option value="clothing">Одежда</option>
                        <option value="dolls">Куклы</option>
                        <option value="dishes">Посуда</option>
                        <option value="accessories">Аксессуары</option>
                    </select>
                    <input type="number" id="priceMin" placeholder="Цена от">
                    <input type="number" id="priceMax" placeholder="Цена до">
                    <select id="sortBy">
                        <option value="default">По умолчанию</option>
                        <option value="price_asc">Дешевые</option>
                        <option value="price_desc">Дорогие</option>
                    </select>
                </div>

                <div class="catalog-grid" id="catalogGrid">
                    <div class="loading">Загрузка товаров...</div>
                </div>

                <div class="pagination" id="pagination"></div>
            </div>
        </div>

        <footer class="footer">
            <div class="ornament-bottom"></div>
            <div class="container footer-grid">
                <div>
                    <h3>Контакты</h3>
                    <p>+7 (999) 444-44-44<br>test@gmail.com</p>
                </div>
                <div>
                    <h3>Разделы</h3>
                    <p><a href="index.html">Главная</a><br><a href="catalog.html">Каталог</a><br><a href="about.html">О мастерах</a></p>
                </div>
                <div>
                    <h3>Мы в соц-сетях</h3>
                    <div class="social-icons">
                        <a href="#" class="social-icon">VK</a>
                        <a href="#" class="social-icon">TG</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyAVOJtq1tCCie0dDjB_GDoH8AQB0EKe_84",
            authDomain: "chuvash-souvenir.firebaseapp.com",
            projectId: "chuvash-souvenir",
            storageBucket: "chuvash-souvenir.firebasestorage.app",
            messagingSenderId: "754730678926",
            appId: "1:754730678926:web:5e45e557c0d298072027df"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let allProducts = [];
        
        async function loadProducts() {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = '<div class="loading">Загрузка товаров...</div>';
            
            try {
                const querySnapshot = await getDocs(collection(db, 'products'));
                allProducts = [];
                querySnapshot.forEach((doc) => {
                    allProducts.push({ id: doc.id, ...doc.data() });
                });
                renderProducts(allProducts);
            } catch (error) {
                grid.innerHTML = '<div class="loading">Ошибка загрузки товаров</div>';
                console.error('Ошибка:', error);
            }
        }
        
        function renderProducts(products) {
            const grid = document.getElementById('catalogGrid');
            
            if (!products || products.length === 0) {
                grid.innerHTML = '<div class="loading">Товары не найдены</div>';
                return;
            }
            
            grid.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-image">
                        <img src="images/test.jpg" alt="${product.name}">
                    </div>
                    <div class="card-content">
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                        <div class="price">${product.price} ₽</div>
                        <a href="product.html?id=${product.id}" class="btn">Подробнее</a>
                        <button class="btn add-to-cart" data-name="${product.name}" data-price="${product.price}">В корзину</button>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            // Привязываем кнопки "В корзину"
            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', function() {
                    const name = this.getAttribute('data-name');
                    const price = parseInt(this.getAttribute('data-price'));
                    addToCart(name, price);
                });
            });
        }
        
        function addToCart(name, price) {
            let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
            const existingItem = cartItems.find(item => item.name === name);
            if (existingItem) {
                if (existingItem.quantity < 10) {
                    existingItem.quantity++;
                } else {
                    alert('Максимальное количество - 10');
                    return;
                }
            } else {
                cartItems.push({
                    id: Date.now(),
                    name: name,
                    description: "Традиционный чувашский сувенир",
                    price: price,
                    quantity: 1,
                    inStock: true
                });
            }
            localStorage.setItem('cartItems', JSON.stringify(cartItems));
            updateCartCounter();
            alert(`"${name}" добавлен в корзину`);
        }
        
        function updateCartCounter() {
            const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
            const total = cartItems.reduce((sum, item) => sum + item.quantity, 0);
            const cartCount = document.querySelector('.cart-count');
            if (cartCount) {
                cartCount.textContent = total;
                cartCount.style.display = total > 0 ? 'flex' : 'none';
            }
        }
        
        // Фильтрация и сортировка
        document.getElementById('categoryFilter')?.addEventListener('change', () => applyFilters());
        document.getElementById('priceMin')?.addEventListener('input', () => applyFilters());
        document.getElementById('priceMax')?.addEventListener('input', () => applyFilters());
        document.getElementById('sortBy')?.addEventListener('change', () => applyFilters());
        
        function applyFilters() {
            const category = document.getElementById('categoryFilter').value;
            const min = parseInt(document.getElementById('priceMin').value) || 0;
            const max = parseInt(document.getElementById('priceMax').value) || Infinity;
            let sortBy = document.getElementById('sortBy').value;
            
            let filtered = allProducts.filter(p => {
                const categoryMatch = category === 'all' || p.category === category;
                const priceMatch = p.price >= min && p.price <= max;
                return categoryMatch && priceMatch;
            });
            
            if (sortBy === 'price_asc') {
                filtered.sort((a, b) => a.price - b.price);
            } else if (sortBy === 'price_desc') {
                filtered.sort((a, b) => b.price - a.price);
            }
            
            renderProducts(filtered);
        }
        
        loadProducts();
        updateCartCounter();
    </script>
</body>
</html>
