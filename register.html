<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Чувашский сувенир</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-content">
        <header class="header">
            <div class="ornament-top"></div>
            <div class="container">
                <div class="header-content">
                    <div class="logo">
                        <a href="index.html">
                            <img src="images/logo.png" alt="Чувашский сувенир">
                        </a>
                    </div>
                    <nav class="nav">
                        <a href="index.html" class="nav-link">Главная</a>
                        <a href="catalog.html" class="nav-link">Каталог</a>
                        <a href="about.html" class="nav-link">О мастерах</a>
                        <a href="contacts.html" class="nav-link">Контакты</a>
                    </nav>
                    <div class="header-actions">
                        <div class="search-box">
                            <input type="text" placeholder="Поиск товаров..." class="search-input">
                            <button class="search-btn">🔍</button>
                        </div>
                        <div class="header-icons">
                            <a href="account.html" class="icon-link" title="Личный кабинет">
                                <span class="icon">👤</span>
                            </a>
                            <a href="cart.html" class="icon-link cart-link" title="Корзина">
                                <span class="icon">🛒</span>
                                <span class="cart-count">0</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ornament-header-bottom"></div>
        </header>

        <div class="container">
            <div class="auth-wrapper">
                <div class="auth-box">
                    <h2>Регистрация</h2>
                    <form id="registerForm">
                        <div class="form-group">
                            <label>Имя</label>
                            <input type="text" id="regName" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="regEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Пароль</label>
                            <input type="password" id="regPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                        <p class="auth-link">Уже есть аккаунт? <a href="login.html">Войти</a></p>
                    </form>
                </div>
            </div>
        </div>

        <footer class="footer">
            <div class="ornament-bottom"></div>
            <div class="container footer-grid">
                <div><h3>Контакты</h3><p>+7 (999) 444-44-44<br>test@gmail.com</p></div>
                <div><h3>Разделы</h3><p><a href="index.html">Главная</a><br><a href="catalog.html">Каталог</a><br><a href="about.html">О мастерах</a></p></div>
                <div><h3>Мы в соц-сетях</h3><div class="social-icons"><a href="#" class="social-icon">VK</a><a href="#" class="social-icon">TG</a></div></div>
            </div>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyAVOJtq1tCCie0dDjB_GDoH8AQB0EKe_84",
            authDomain: "chuvash-souvenir.firebaseapp.com",
            projectId: "chuvash-souvenir",
            storageBucket: "chuvash-souvenir.firebasestorage.app",
            messagingSenderId: "754730678926",
            appId: "1:754730678926:web:5e45e557c0d298072027df"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName: name });
                await setDoc(doc(db, 'users', userCredential.user.uid), {
                    name: name,
                    email: email,
                    createdAt: new Date()
                });
                alert('Регистрация успешна!');
                window.location.href = 'account.html';
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        });
        
        function updateCartCounter() {
            const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
            const total = cartItems.reduce((sum, i) => sum + i.quantity, 0);
            const el = document.querySelector('.cart-count');
            if (el) { el.textContent = total; el.style.display = total > 0 ? 'flex' : 'none'; }
        }
        updateCartCounter();
    </script>
    
    <style>
        .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 60vh; }
        .auth-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .auth-box h2 { text-align: center; margin-bottom: 25px; color: #8B2000; }
        .auth-box .form-group { margin-bottom: 15px; }
        .auth-box .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .auth-box .btn { width: 100%; padding: 12px; background: #E24A2C; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .auth-link { text-align: center; margin-top: 15px; }
        .auth-link a { color: #E24A2C; text-decoration: none; }
    </style>
</body>
</html>
